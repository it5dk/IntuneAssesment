services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: driftcontrol
      POSTGRES_PASSWORD: driftcontrol
      POSTGRES_DB: driftcontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      DATABASE_URL_SYNC: postgresql://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      DATABASE_URL_SYNC: postgresql://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.scheduler beat --loglevel=info
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      DATABASE_URL_SYNC: postgresql://driftcontrol:driftcontrol@postgres:5432/driftcontrol
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
